name: Release

on:
  push:
    branches: [main]

env:
  DOTNET_NOLOGO: "true"
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: "true"
  DOTNET_CLI_TELEMETRY_OPTOUT: "true"

permissions:
  contents: write # needed for tag + release creation
  packages: write # needed for GHCR push

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    outputs:
      fullSemVer: ${{ steps.gitversion.outputs.fullSemVer }}
      semVer: ${{ steps.gitversion.outputs.semVer }}
      majorMinorPatch: ${{ steps.gitversion.outputs.majorMinorPatch }}
      assemblySemVer: ${{ steps.gitversion.outputs.assemblySemVer }}
      assemblySemFileVer: ${{ steps.gitversion.outputs.assemblySemFileVer }}
      informationalVersion: ${{ steps.gitversion.outputs.informationalVersion }}
      sha: ${{ steps.gitversion.outputs.sha }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install GitVersion
        uses: gittools/actions/gitversion/setup@v4.7.0
        with:
          versionSpec: "6.x"

      - name: Determine version
        id: gitversion
        uses: gittools/actions/gitversion/execute@v4.7.0

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Restore
        run: dotnet restore BookmarksManager.sln

      - name: Build
        run: |
          dotnet build BookmarksManager.sln \
            --configuration Release \
            --no-restore \
            -p:Version=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:AssemblyVersion=${{ steps.gitversion.outputs.assemblySemVer }} \
            -p:FileVersion=${{ steps.gitversion.outputs.assemblySemFileVer }} \
            -p:InformationalVersion=${{ steps.gitversion.outputs.informationalVersion }}

      - name: Test
        run: |
          dotnet test BookmarksManager.sln \
            --configuration Release --no-build \
            --logger trx --results-directory TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: test-results
          path: TestResults/

  docker:
    name: Build & push Docker image
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=raw,value=${{ needs.build-and-test.outputs.fullSemVer }}
            type=raw,value=${{ needs.build-and-test.outputs.majorMinorPatch }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.version=${{ needs.build-and-test.outputs.fullSemVer }}
            org.opencontainers.image.revision=${{ needs.build-and-test.outputs.sha }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.title=Bookmarks Manager API
            org.opencontainers.image.description=RESTful API for managing bookmarks, folders and tags

      - name: Build & push
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ needs.build-and-test.outputs.fullSemVer }}
            ASSEMBLY_VERSION=${{ needs.build-and-test.outputs.assemblySemVer }}
            FILE_VERSION=${{ needs.build-and-test.outputs.assemblySemFileVer }}
            INFORMATIONAL_VERSION=${{ needs.build-and-test.outputs.informationalVersion }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: Tag & release
    needs: [build-and-test, docker]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Create tag & release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.build-and-test.outputs.fullSemVer }}
          name: v${{ needs.build-and-test.outputs.fullSemVer }}
          target_commitish: ${{ github.sha }}
          generate_release_notes: true
          make_latest: true
          body: |
            ## Bookmarks Manager API ${{ needs.build-and-test.outputs.fullSemVer }}

            **Docker image:** `ghcr.io/${{ github.repository }}:${{ needs.build-and-test.outputs.fullSemVer }}`

            Also tagged `${{ needs.build-and-test.outputs.majorMinorPatch }}` and `latest`.
