title: Bookmarks Manager API
description: >-
  A RESTful API for managing bookmarks, folders and tags, built with .NET 10,
  ASP.NET Core Minimal APIs and Entity Framework Core.

theme: just-the-docs

url: https://guibranco.github.io
baseurl: /bookmarks-manager-api

# ── Layout defaults ──────────────────────────────────────────────────────────
# just-the-docs is a gem-based theme: Jekyll does not inherit page defaults from
# the theme's own _config.yml, so every page needs `layout: default` explicitly
# set here (or in its own front matter) or it renders with no theme at all.
# index.md overrides this with `layout: home` in its own front matter.
defaults:
  - scope:
      path: ""
    values:
      layout: default

# ── Navigation ──────────────────────────────────────────────────────────────
nav_sort: order
heading_anchors: true
back_to_top: true
back_to_top_text: "Back to top"

# ── Search ───────────────────────────────────────────────────────────────────
search_enabled: true
search:
  heading_level: 3
  previews: 3
  preview_words_before: 5
  preview_words_after: 10
  tokenizer_separator: /[\s/]+/
  rel_url: true
  button: false

# ── Appearance ───────────────────────────────────────────────────────────────
color_scheme: dark

# ── Diagrams ─────────────────────────────────────────────────────────────────
mermaid:
  version: "10.9.1"

# ── GitHub integration ───────────────────────────────────────────────────────
gh_edit_link: true
gh_edit_link_text: "✏️ Edit this page on GitHub"
gh_edit_repository: "https://github.com/guibranco/bookmarks-manager-api"
gh_edit_branch: "main"
gh_edit_source: docs
gh_edit_view_mode: "edit"

# ── Footer ───────────────────────────────────────────────────────────────────
footer_content: >-
  Copyright &copy; 2026
  <a href="https://github.com/guibranco">Guilherme Branco Stracini</a>.
  Distributed by an
  <a href="https://github.com/guibranco/bookmarks-manager-api/blob/main/LICENSE">MIT license.</a>

# ── Callouts ─────────────────────────────────────────────────────────────────
callouts_level: quiet
callouts:
  highlight:
    color: yellow
  important:
    title: Important
    color: blue
  new:
    title: New
    color: green
  note:
    title: Note
    color: purple
  warning:
    title: Warning
    color: red

# ── Jekyll ───────────────────────────────────────────────────────────────────
plugins:
  - jekyll-seo-tag

exclude:
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor

markdown: kramdown
highlighter: rouge
kramdown:
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    block:
      line_numbers: true
